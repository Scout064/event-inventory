{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Production: {{ prod[1] }}</h2>
  <div class="d-flex gap-2">
    <form action="{{ url_for('productions_clear_all', pid=prod[0]) }}" method="POST" onsubmit="return confirm('Are you sure you want to remove ALL items?');">
        <button type="submit" class="btn btn-outline-danger">Clear All Items</button>
    </form>
    <a class="btn btn-outline-info" href="{{ url_for('report_production_pdf', pid=prod[0]) }}" target="_blank">Download BOM PDF</a>
    <a class="btn btn-outline-secondary" href="{{ url_for('productions') }}">Back</a>
  </div>
</div>

<div class="row">
  <div class="col-md-8 mb-4">
    <div class="card shadow-sm">
      <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Assigned Items ({{ items|length }})</h5>
        <button type="submit" form="batchRemoveForm" class="btn btn-sm btn-danger" id="batchDeleteBtn" disabled>
            Remove Selected
        </button>
      </div>

      <form id="batchRemoveForm" action="{{ url_for('productions_batch_remove', pid=prod[0]) }}" method="POST">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="selectAll" class="form-check-input"></th>
              <th>ID</th>
              <th>Name</th>
              <th>Category</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody>
            {% for r in items %}
            <tr>
              <td><input type="checkbox" name="item_ids" value="{{ r[0] }}" class="form-check-input item-checkbox"></td>
              <td><span class="fw-bold">{{ r[0] }}</span></td>
              <td>{{ r[1] }}</td>
              <td><span class="badge bg-light text-dark">{{ r[2] or '' }}</span></td>
              <td class="text-end">
                <button type="button" class="btn btn-sm btn-link text-danger p-0" onclick="confirmSingleRemove('{{ r[0] }}', '{{ r[1] }}')">Remove</button>
              </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="text-center py-4 text-muted">No items assigned.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </form>
    </div>
  </div>

  <form id="singleRemoveForm" action="{{ url_for('productions_remove', pid=prod[0]) }}" method="POST" style="display:none;">
    <input type="hidden" name="inventory_id" id="singleRemoveId">
  </form>

  <div class="col-md-4">
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.item-checkbox');
    const batchBtn = document.getElementById('batchDeleteBtn');

    // Toggle all checkboxes
    if(selectAll) {
        selectAll.addEventListener('change', function() {
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
            updateBatchButton();
        });
    }

    // Enable/Disable button based on selection
    checkboxes.forEach(cb => {
        cb.addEventListener('change', updateBatchButton);
    });

    function updateBatchButton() {
        const checkedCount = document.querySelectorAll('.item-checkbox:checked').length;
        batchBtn.disabled = checkedCount === 0;
        batchBtn.textContent = checkedCount > 0 ? `Remove Selected (${checkedCount})` : 'Remove Selected';
    }
});

// Helper for single removal to keep HTML valid (avoids nested forms)
function confirmSingleRemove(id, name) {
    if (confirm(`Remove ${name} from production?`)) {
        document.getElementById('singleRemoveId').value = id;
        document.getElementById('singleRemoveForm').submit();
    }
}
</script>
{% endblock %}
