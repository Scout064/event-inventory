{% extends 'base.html' %}
{% block content %}
<h3>Admin Settings</h3>
<div class="card p-4">
    <form method="post" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Site Name</label>
        <input type="text" name="site_name" class="form-control" 
               value="{{ cfg.site_name or 'Inventory' }}" placeholder="Enter site name" maxlength="32">
      </div>
      
      <div class="mb-3">
        <label class="form-label">Update Company Logo (PNG/JPEG)</label>
        <input type="file" name="company_logo" class="form-control" accept="image/png, image/jpeg, .png, .jpg, .jpeg">
      </div>     

      {% if cfg.logo_path %}
      <hr>
      <p class="text-muted">Current logo preview:</p>
      <div class="border rounded d-inline-block p-3 bg-light mb-4">
          <img src="/uploads/{{ cfg.logo_path.split('/')[-1] }}" style="max-height:120px" class="d-block mb-2">    
          <div class="form-check">
              <input class="form-check-input" type="checkbox" name="remove_logo" id="removeLogo" value="yes">
              <label class="form-check-label text-danger" for="removeLogo">
                  Remove logo and use text only
              </label>
          </div>
      </div>
      <br>
      {% endif %}

      <button type="submit" class="btn btn-primary">Save Branding</button>
    </form>
</div>
{% endblock %}
