{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>User Management</h3>
    <a href="{{ url_for('admin_user_edit') }}" class="btn btn-primary">Add New User</a>
</div>

<div class="card shadow-sm">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th class="text-end">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td class="align-middle">{{ user[1] }}</td>
                <td class="align-middle">
                    {% if user[2] %}
                    <span class="badge bg-danger">Admin</span>
                    {% else %}
                    <span class="badge bg-secondary">User</span>
                    {% endif %}
                </td>
                <td class="text-end">
                    <a href="{{ url_for('admin_user_edit', user_id=user[0]) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                    
                    <form action="{{ url_for('admin_user_delete', user_id=user[0]) }}" method="POST" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this user? This cannot be undone.');">
                        <button type="submit" class="btn btn-sm btn-outline-danger" 
                                {% if user[0]|string == current_user.id|string %}disabled{% endif %}>
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
