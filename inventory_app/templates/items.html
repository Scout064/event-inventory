{% extends 'base.html' %}
{% block content %}
<style>
  /* Visual feedback: show headers are clickable */
  th.sortable { cursor: pointer; position: relative; }
  th.sortable:hover { background-color: #f8f9fa; }
  th.sortable::after {
    content: ' \21C5'; /* Up/Down arrow symbol */
    opacity: 0.3;
    font-size: 0.8em;
  }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Items</h3>
  <div class="d-flex gap-2">
    <input type="text" id="itemFilter" class="form-control" placeholder="Search items...">
    <a class="btn btn-primary text-nowrap" href="{{ url_for('items_new') }}">Add Item</a>
  </div>
</div>

<table class="table table-striped table-sm" id="inventoryTable">
  <thead>
    <tr>
      <th class="sortable" onclick="sortTable(0)">ID</th>
      <th class="sortable" onclick="sortTable(1)">Name</th>
      <th class="sortable" onclick="sortTable(2)">Category</th>
      <th class="sortable" onclick="sortTable(3)">Serial</th>
      <th class="sortable" onclick="sortTable(4)">Manufacturer</th>
      <th class="sortable" onclick="sortTable(5)">Model</th>
      <th></th> </tr>
  </thead>
  <tbody id="itemTableBody">
  {% for r in rows %}
    <tr>
      <td><a href="{{ url_for('label_png', inventory_id=r[0]) }}" target="_blank">{{ r[0] }}</a></td>
      <td>{{ r[1] }}</td>
      <td>{{ r[2] or '' }}</td>
      <td>{{ r[3] or '' }}</td>
      <td>{{ r[4] or '' }}</td>
      <td>{{ r[5] or '' }}</td>
      <td class="text-end">
        <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('items_edit', inventory_id=r[0]) }}">Edit</a>
        <form action="{{ url_for('items_delete', inventory_id=r[0]) }}" method="post" style="display:inline" onsubmit="return confirm('Delete item?')">
          <button class="btn btn-sm btn-outline-danger">Delete</button>
        </form>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>



<script>
  // --- 1. SEARCH FILTER LOGIC ---
  document.getElementById('itemFilter').addEventListener('keyup', function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll('#itemTableBody tr');
    rows.forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(filter) ? '' : 'none';
    });
  });

  // --- 2. TABLE SORT LOGIC ---
  function sortTable(n) {
    const table = document.getElementById("inventoryTable");
    let switching = true;
    let dir = "asc"; 
    let switchcount = 0;

    while (switching) {
      switching = false;
      const rows = table.rows;
      /* Loop through all table rows (except the header) */
      for (var i = 1; i < (rows.length - 1); i++) {
        var shouldSwitch = false;
        var x = rows[i].getElementsByTagName("TD")[n];
        var y = rows[i + 1].getElementsByTagName("TD")[n];

        // Determine if values are numeric (for ID column) or text
        var xVal = isNaN(x.textContent) ? x.textContent.toLowerCase() : parseFloat(x.textContent);
        var yVal = isNaN(y.textContent) ? y.textContent.toLowerCase() : parseFloat(y.textContent);

        if (dir == "asc") {
          if (xVal > yVal) { shouldSwitch = true; break; }
        } else if (dir == "desc") {
          if (xVal < yVal) { shouldSwitch = true; break; }
        }
      }
      if (shouldSwitch) {
        rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
        switching = true;
        switchcount ++;      
      } else {
        /* If no switching has been done AND the direction is "asc",
        set the direction to "desc" and run the loop again. */
        if (switchcount == 0 && dir == "asc") {
          dir = "desc";
          switching = true;
        }
      }
    }
  }
</script>
{% endblock %}
