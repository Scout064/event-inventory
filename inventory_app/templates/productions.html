{% extends 'base.html' %}
{% block content %}
<style>
  /* Visual feedback for sortable headers */
  th.sortable { cursor: pointer; position: relative; user-select: none; }
  th.sortable:hover { background-color: #f8f9fa; }
  th.sortable::after {
    content: ' \21C5'; /* Up/Down arrow symbol */
    opacity: 0.3;
    font-size: 0.8em;
  }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Productions</h3>
  
  <div class="d-flex gap-3">
    <form action="{{ url_for('productions') }}" method="get" class="d-flex gap-2">
      <input type="text" name="q" value="{{ q }}" class="form-control" placeholder="Search productions..." style="width: 250px;">
      <button type="submit" class="btn btn-outline-primary">Search</button>
      {% if q %}
        <a href="{{ url_for('productions') }}" class="btn btn-outline-secondary">Clear</a>
      {% endif %}
    </form>
    
    <a class="btn btn-primary" href="{{ url_for('productions_new') }}">Add Production</a>
  </div>
</div>

<table class="table table-striped table-sm" id="productionsTable">
  <thead>
    <tr>
      <th class="sortable" onclick="sortTable(0, 'num')">ID</th>
      <th class="sortable" onclick="sortTable(1, 'str')">Name</th>
      <th class="sortable" onclick="sortTable(2, 'str')">Date</th>
      <th class="sortable" onclick="sortTable(3, 'str')">Notes</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  {% for r in rows %}
    <tr>
      <td>{{ r[0] }}</td>
      <td><a href="{{ url_for('productions_view', pid=r[0]) }}">{{ r[1] }}</a></td>
      <td>{{ r[2] or '' }}</td>
      <td>{{ r[3] or '' }}</td>
      <td class="text-end">
        <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('productions_edit', pid=r[0]) }}">Edit</a>
        <a class="btn btn-sm btn-outline-info" href="{{ url_for('report_production_pdf', pid=r[0]) }}">BOM PDF</a>
        <form action="{{ url_for('productions_delete', pid=r[0]) }}" method="post" style="display:inline" onsubmit="return confirm('Delete production?')">
          <button class="btn btn-sm btn-outline-danger">Delete</button>
        </form>
      </td>
    </tr>
  {% else %}
    <tr>
      <td colspan="5" class="text-center py-4 text-muted">No productions found.</td>
    </tr>
  {% endfor %}
  </tbody>
</table>

<script>
  // Frontend Table Sorting Logic
  function sortTable(n, type) {
    const table = document.getElementById("productionsTable");
    let switching = true;
    let dir = "asc"; 
    let switchcount = 0;
    
    while (switching) {
      switching = false;
      const rows = table.rows;
      
      for (let i = 1; i < (rows.length - 1); i++) {
        let shouldSwitch = false;
        
        // Get the two cells to compare
        let x = rows[i].getElementsByTagName("TD")[n];
        let y = rows[i + 1].getElementsByTagName("TD")[n];
        
        let xVal = x.textContent.trim().toLowerCase();
        let yVal = y.textContent.trim().toLowerCase();
        
        // Parse numbers if sorting the ID column
        if (type === 'num') {
          xVal = parseFloat(xVal) || 0;
          yVal = parseFloat(yVal) || 0;
        }

        if (dir === "asc") {
          if (xVal > yVal) { shouldSwitch = true; break; }
        } else if (dir === "desc") {
          if (xVal < yVal) { shouldSwitch = true; break; }
        }
      }
      
      if (shouldSwitch) {
        rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
        switching = true;
        switchcount++;
      } else {
        if (switchcount === 0 && dir === "asc") {
          dir = "desc";
          switching = true;
        }
      }
    }
  }
</script>
{% endblock %}
